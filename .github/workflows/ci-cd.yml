name: CI/CD / deploy

on:
  push:
    branches: ["main"]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # FIX PART A: Install only native Python packages via pip
      - name: Install Ansible & deps
        run: |
          python -m pip install --upgrade pip
          pip install ansible ansible-lint

      # FIX PART B: Install the Ansible collection via the correct galaxy engine
      - name: Install Ansible Docker Collection
        run: |
          ansible-galaxy collection install community.docker

      - name: Run playbook
        run: |
          echo "Executing automated deployment runbooks..."
          # ansible-playbook site.yml
