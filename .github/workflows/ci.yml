name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: python -m pip install --upgrade pip "setuptools>=83" && pip install -e ".[dev]"
      - run: ruff check src tests
      - run: mypy src/config.py src/data_client.py src/llm_agent.py
      - run: pytest
      - run: python -m benchmarks.latency_benchmark --max-seconds 0.25

  security:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: python -m pip install --upgrade pip "setuptools>=83" && pip install -e ".[dev]"
      - run: bandit -r src -q
      - run: pip-audit

  package-container:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - run: docker build --tag quant-llm-assistant:${{ github.sha }} .
      - run: docker run --rm quant-llm-assistant:${{ github.sha }} --help
